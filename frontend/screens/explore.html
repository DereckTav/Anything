<!-- ═══ Explore Screen ═══
     Main screen: camera background, voice button, POI chips.
     Loaded into #screen-exploring by app.js. -->

<!-- Live video background (dimmed) -->
<video id="camera-feed" autoplay playsinline muted
  class="fixed inset-0 w-full h-full object-cover z-0"></video>

<!-- Dark gradient overlay for readability -->
<div class="fixed inset-0 bg-gradient-to-b from-black/50 via-black/20 to-black/60 z-[1] pointer-events-none"></div>


<!-- ── Top bar ── -->
<div class="fixed top-0 left-0 right-0 z-30 flex justify-between items-start px-5 pt-safe-top pt-4">
  <div>
    <span class="font-label text-[9px] uppercase tracking-[0.25em] text-primary/60 block">Brooklyn</span>
    <span class="font-headline italic text-lg text-primary leading-tight">WAYPOINT</span>
  </div>
  
</div>

<!-- ── Voice status label (shows when voice is active) ── -->
<div id="voice-status-bar" class="fixed top-16 left-0 right-0 z-30 flex justify-center hidden">
  <div class="glass-panel px-4 py-1.5 rounded-full flex items-center gap-2">
    <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
    <span id="voice-status-label" class="font-label text-[9px] text-primary uppercase tracking-wider">Listening</span>
  </div>
</div>

<!-- ── Live caption / subtitle ── -->
<div id="caption-container" class="fixed bottom-36 left-0 right-0 z-20 px-8 text-center transition-opacity duration-300" style="opacity:0;">
  <span id="subtitle-text"
    class="font-headline italic text-base text-white text-shadow-strong leading-relaxed"></span>
</div>

<!-- ── POI chips row ── -->
<div id="poi-chips-row" class="fixed bottom-24 left-0 right-0 z-20 px-4 overflow-x-auto no-scrollbar">
  <div id="poi-chips-container" class="flex gap-2 pb-1"></div>
</div>

<!-- ── Loading indicator ── -->
<div id="loading-indicator" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-20 hidden">
  <div class="pulse-dot"></div>
</div>

<!-- ── Bottom nav ── -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 glass-panel rounded-full px-8 py-4 flex gap-8 items-center">

  <!-- VOICE button -->
  <button id="btn-voice" class="flex flex-col items-center gap-1 text-white/60 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-3xl">mic</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Voice</span>
  </button>

  <!-- NEARBY button -->
  <button id="btn-nearby" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-2xl">explore</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Nearby</span>
  </button>

  <!-- EXIT button -->
  <button id="btn-close-analysis" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-2xl">close</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Exit</span>
  </button>

</div>

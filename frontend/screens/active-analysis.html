<!-- ═══ Active Analysis Screen ═══
     Full-screen live video with voice conversation.
     Loaded into #screen-analyzing by app.js. -->

<!-- Live video background -->
<video id="camera-feed" autoplay playsinline muted
  class="fixed inset-0 w-full h-full object-cover z-0"></video>

<!-- Subtle gradient for readability -->
<div class="fixed inset-0 bg-gradient-to-b from-transparent via-transparent to-black/50 z-[1] pointer-events-none"></div>

<!-- ── Live caption area ── -->
<div id="caption-container" class="fixed bottom-28 left-0 right-0 z-20 px-6 text-center transition-opacity duration-200" style="opacity:0;">
  <span id="subtitle-text"
    class="text-white text-base leading-relaxed font-sans drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]"></span>
</div>

<!-- ── Bottom nav — voice only ── -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-8">
  <button id="btn-voice" class="flex flex-col items-center gap-1 text-white/60 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-3xl">mic</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Voice</span>
  </button>
  <button id="btn-close-analysis" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-2xl">close</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Exit</span>
  </button>
</div>

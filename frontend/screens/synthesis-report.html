<!-- ═══ Synthesis Report Screen ═══
     Session summary with timeline, stills, and verdict.
     Loaded into #screen-report by app.js. -->

<!-- Solid dark background -->
<div class="fixed inset-0 bg-background z-0"></div>

<!-- ── Top bar ── -->
<div class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-5 pt-[env(safe-area-inset-top,12px)] pb-3 bg-background/80 backdrop-blur-sm border-b border-outline-variant/10">
  <span class="font-label text-[11px] uppercase tracking-[0.2em] text-white/80">URBANLENS</span>
  <button id="btn-export-pdf"
    class="bg-primary text-on-primary font-body font-semibold text-xs px-4 py-2 rounded-full flex items-center gap-2 transition-all hover:scale-105 active:scale-95">
    <span class="material-symbols-outlined text-base">picture_as_pdf</span>
    Export PDF
  </button>
</div>

<!-- ── Scrollable content area ── -->
<div class="fixed inset-0 z-10 overflow-y-auto pt-20 pb-32 px-6">
  <div class="max-w-md mx-auto">

    <!-- Section header -->
    <div class="mb-6">
      <span class="font-label text-[10px] uppercase tracking-[0.3em] text-primary/60">Session Complete</span>
      <h2 class="font-headline italic text-3xl text-primary mt-1">Synthesis Report</h2>
    </div>

    <!-- Metadata block -->
    <div class="bg-surface-container rounded-lg p-5 mb-8">
      <div class="grid grid-cols-2 gap-y-4 gap-x-6">
        <div>
          <span class="font-label text-[9px] uppercase tracking-wider text-on-surface-variant/60">Report ID</span>
          <p id="report-id" class="font-label text-sm text-on-surface mt-0.5">CS-XXXX</p>
        </div>
        <div>
          <span class="font-label text-[9px] uppercase tracking-wider text-on-surface-variant/60">Location</span>
          <p id="report-location" class="font-body text-sm text-on-surface mt-0.5 leading-snug">—</p>
        </div>
        <div>
          <span class="font-label text-[9px] uppercase tracking-wider text-on-surface-variant/60">Date</span>
          <p id="report-date" class="font-label text-sm text-on-surface mt-0.5">—</p>
        </div>
        <div>
          <span class="font-label text-[9px] uppercase tracking-wider text-on-surface-variant/60">Session Duration</span>
          <p id="report-duration" class="font-label text-sm text-on-surface mt-0.5 tabular-nums">—</p>
        </div>
      </div>
    </div>

    <!-- ── Section: Narrative Log (timeline) ── -->
    <div class="mb-10">
      <span class="font-label text-[10px] uppercase tracking-[0.2em] text-primary/50 mb-4 block">Narrative Log</span>
      <div id="narrative-timeline" class="relative pl-8">
        <!-- Vertical timeline line -->
        <div class="absolute left-[11px] top-2 bottom-2 w-px bg-outline-variant/20"></div>
        <!-- Entries populated by app.js -->
        <div id="timeline-empty" class="py-6 text-center pl-0 -ml-8">
          <p class="font-body text-xs text-on-surface-variant/40 italic">No narration recorded.</p>
        </div>
      </div>
    </div>

    <!-- ── Section: Captured Stills (horizontal scroll) ── -->
    <div class="mb-10">
      <span class="font-label text-[10px] uppercase tracking-[0.2em] text-primary/50 mb-4 block">Captured Stills</span>
      <div id="stills-scroll" class="flex overflow-x-auto gap-4 no-scrollbar -mx-6 px-6 pb-4">
        <!-- Cards populated by app.js -->
        <div id="stills-empty" class="w-full py-6 text-center flex-shrink-0">
          <p class="font-body text-xs text-on-surface-variant/40 italic">No stills captured during this session.</p>
        </div>
      </div>
    </div>

    <!-- ── Section: Summary Verdict ── -->
    <div id="verdict-section" class="bg-primary/[0.05] border border-primary/10 rounded-lg p-6 mb-8">
      <h3 class="font-headline italic text-xl text-primary mb-3">Summary Verdict</h3>
      <p id="verdict-text" class="font-body text-sm text-on-surface-variant leading-relaxed">
        Awaiting analysis...
      </p>
    </div>

  </div>
</div>

<!-- ── Bottom nav pill ── -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 glass-panel rounded-full px-8 py-4 flex gap-8">
  <button id="btn-listen" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-2xl">mic</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Listen</span>
  </button>
  <button id="btn-record" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-2xl">videocam</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Record</span>
  </button>
  <button class="flex flex-col items-center gap-1 text-[#D4C3A3] scale-110 transition-all pointer-events-none">
    <span class="material-symbols-outlined filled text-2xl">pause</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">End</span>
  </button>
  <button id="btn-discard" class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors">
    <span class="material-symbols-outlined text-2xl">cancel</span>
    <span class="font-label text-[8px] uppercase tracking-tighter">Discard</span>
  </button>
</div>

<!-- ═══ Place Detail Screen ═══
     Detailed view of a selected POI with navigation handoff.
     Loaded into #screen-detail by app.js. -->

<!-- Dark background -->
<div class="fixed inset-0 bg-background z-0"></div>

<!-- ── Top bar ── -->
<div class="fixed top-0 left-0 right-0 z-30 glass-panel border-b border-outline-variant/20">
  <div class="flex items-center justify-between px-5 py-4 pt-safe-top">
    <button id="btn-back-detail" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors">
      <span class="material-symbols-outlined text-xl">arrow_back</span>
      <span class="font-label text-[10px] uppercase tracking-wider">Back</span>
    </button>
    <span class="font-label text-[9px] uppercase tracking-[0.25em] text-primary/60">Place Detail</span>
    <div class="w-16"></div><!-- spacer -->
  </div>
</div>

<!-- ── Content ── -->
<div class="fixed inset-0 overflow-y-auto z-20 pt-20 pb-32 px-6">

  <!-- Category badge -->
  <div class="mt-4 mb-2">
    <span id="detail-type"
      class="font-label text-[9px] uppercase tracking-[0.2em] text-primary/70 bg-primary/10 px-3 py-1 rounded-full border border-primary/20">
      Point of Interest
    </span>
  </div>

  <!-- Name -->
  <h1 id="detail-name" class="font-headline italic text-4xl text-primary mt-3 mb-1 leading-tight">
    Place Name
  </h1>

  <!-- Address -->
  <p id="detail-address" class="font-label text-[11px] text-on-surface-variant/60 mb-6">—</p>

  <!-- Walk time card -->
  <div id="detail-distance-card" class="glass-panel rounded-xl p-4 mb-4 flex items-center gap-4 border border-primary/10">
    <span class="material-symbols-outlined text-2xl text-primary/60">directions_walk</span>
    <div>
      <span class="font-label text-[9px] uppercase tracking-wider text-on-surface-variant/50 block">Walking distance</span>
      <span id="detail-walk-time" class="font-headline italic text-xl text-primary">—</span>
    </div>
  </div>

  <!-- Description (from AI search) -->
  <div id="detail-description-card" class="glass-panel rounded-xl p-4 mb-6 border border-outline-variant/30 hidden">
    <span class="font-label text-[9px] uppercase tracking-wider text-on-surface-variant/50 block mb-2">About this place</span>
    <p id="detail-description" class="font-body text-sm text-on-surface leading-relaxed"></p>
  </div>

  <!-- Coordinates -->
  <div class="flex items-center gap-2 mb-8">
    <span class="material-symbols-outlined text-sm text-white/20">location_on</span>
    <span id="detail-coords" class="font-label text-[9px] text-white/25">—</span>
  </div>

</div>

<!-- ── Fixed bottom CTA ── -->
<div class="fixed bottom-0 left-0 right-0 z-40 px-6 pb-8 pt-4 bg-gradient-to-t from-background via-background/95 to-transparent">
  <a id="btn-take-me-there"
    href="#"
    target="_blank"
    rel="noopener noreferrer"
    class="flex items-center justify-center gap-3 w-full bg-primary text-on-primary font-body font-semibold text-sm uppercase tracking-wider py-4 rounded-full transition-all duration-200 hover:scale-[1.02] active:scale-95 hover:shadow-[0_0_30px_rgba(241,223,190,0.2)]">
    <span class="material-symbols-outlined text-xl">near_me</span>
    Take Me There
  </a>
  <p class="font-label text-[9px] text-white/20 text-center mt-2">Opens Google Maps with walking directions</p>
</div>
